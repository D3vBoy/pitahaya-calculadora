<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitahaya Investments - Modificar Datos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --rosa-primario: #ff69b4;
            --rosa-secundario: #ffb6c1;
            --rosa-oscuro: #c71585;
            --rosa-suave: #fff0f5;
            --blanco-translucido: rgba(255, 255, 255, 0.92);
            --sombra-rosa: rgba(255, 105, 180, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url("{{ url_for('static', filename='fondo-pitahaya.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 20px 0;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.03);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        .main-card {
            background-color: var(--blanco-translucido);
            backdrop-filter: blur(8px);
            border-radius: 25px;
            box-shadow: 0 20px 40px var(--sombra-rosa);
            overflow: hidden;
            border: 2px solid var(--rosa-secundario);
        }

        .header-gradient {
            background: linear-gradient(135deg, var(--rosa-primario) 0%, var(--rosa-oscuro) 100%);
            padding: 30px;
            color: white;
            border-bottom: 3px solid var(--rosa-secundario);
        }

        .form-container {
            padding: 40px;
        }

        .form-label {
            font-weight: 600;
            color: var(--rosa-oscuro);
            margin-bottom: 8px;
        }

        .form-control {
            border: 2px solid var(--rosa-secundario);
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--rosa-primario);
            outline: none;
            box-shadow: 0 0 0 3px var(--sombra-rosa);
        }

        .btn-guardar {
            background: linear-gradient(135deg, var(--rosa-primario) 0%, var(--rosa-oscuro) 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-size: 18px;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-guardar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--sombra-rosa);
        }

        .btn-cancelar {
            background: white;
            border: 2px solid var(--rosa-secundario);
            color: var(--rosa-oscuro);
            font-weight: 600;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-size: 18px;
            transition: all 0.3s;
            margin-top: 10px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-cancelar:hover {
            background: var(--rosa-suave);
            border-color: var(--rosa-primario);
            color: var(--rosa-oscuro);
        }

        .alert-danger {
            background-color: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .alert-danger ul {
            margin-bottom: 0;
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <div class="header-gradient text-center">
                <h1 class="display-5 fw-bold mb-3">🍈 Pitahaya Investments</h1>
                <p class="lead mb-0">Modificar mis datos personales</p>
            </div>

            <div class="form-container">
                {% if errores %}
                <div class="alert-danger">
                    <ul class="mb-0">
                        {% for error in errores %}
                        <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                </div>
                {% endif %}

                <form method="POST" action="{{ url_for('modificar_datos') }}">
                    <div class="mb-4">
                        <label for="nombre" class="form-label">
                            <i class="bi bi-person-fill me-2" style="color: var(--rosa-primario);"></i>
                            Nombre completo
                        </label>
                        <input type="text" class="form-control" id="nombre" name="nombre" 
                               value="{{ datos.nombre if datos else '' }}" required>
                    </div>

                    <div class="mb-4">
                        <label for="telefono" class="form-label">
                            <i class="bi bi-telephone-fill me-2" style="color: var(--rosa-primario);"></i>
                            Teléfono
                        </label>
                        <input type="tel" class="form-control" id="telefono" name="telefono" 
                               value="{{ datos.telefono if datos else '' }}" required>
                    </div>

                    <div class="mb-4">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope-fill me-2" style="color: var(--rosa-primario);"></i>
                            Correo electrónico
                        </label>
                        <input type="email" class="form-control" id="email" name="email" 
                               value="{{ datos.email if datos else '' }}" required>
                    </div>

                    <button type="submit" class="btn-guardar">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        Guardar cambios
                    </button>

                    <a href="{{ url_for('calculadora') }}" class="btn-cancelar">
                        <i class="bi bi-arrow-left-circle me-2"></i>
                        Cancelar y volver
                    </a>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('telefono').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
